<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="100%" height="100%">
  <defs>
    <linearGradient id="epi" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fde68a" stop-opacity="0.3"/><stop offset="100%" stop-color="#fde68a" stop-opacity="0.1"/></linearGradient>
    <linearGradient id="upd" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fed7aa" stop-opacity="0.2"/><stop offset="100%" stop-color="#fed7aa" stop-opacity="0.1"/></linearGradient>
    <linearGradient id="lod" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fca5a5" stop-opacity="0.15"/><stop offset="100%" stop-color="#fca5a5" stop-opacity="0.05"/></linearGradient>
    <linearGradient id="fat" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#86efac" stop-opacity="0.1"/><stop offset="100%" stop-color="#86efac" stop-opacity="0.05"/></linearGradient>
    <linearGradient id="smas" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.15"/><stop offset="100%" stop-color="#818cf8" stop-opacity="0.05"/></linearGradient>
    <linearGradient id="musc" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.15"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0.05"/></linearGradient>
  </defs>

  <rect x="0" y="0" width="300" height="40" fill="url(#epi)"/>
  <text x="150" y="25" fill="#fde68a" fill-opacity="0.8" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="600">Epidermis (표피) 0~0.1mm</text>
  
  <rect x="0" y="40" width="300" height="80" fill="url(#upd)"/>
  <text x="150" y="85" fill="#fed7aa" fill-opacity="0.8" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="600">Dermis-Superficial (진피상층) 0.1~1.5mm</text>
  
  <rect x="0" y="120" width="300" height="80" fill="url(#lod)"/>
  <text x="150" y="165" fill="#fca5a5" fill-opacity="0.8" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="600">Dermis-Deep (진피하층) 1.5~3mm</text>
  
  <rect x="0" y="200" width="300" height="80" fill="url(#fat)"/>
  <text x="150" y="245" fill="#86efac" fill-opacity="0.8" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="600">Subcutaneous (피하지방) 3~4.5mm</text>
  <circle cx="50" cy="240" r="12" fill="#86efac" fill-opacity="0.2" stroke="#86efac" stroke-width="0.5"/>
  <circle cx="80" cy="250" r="14" fill="#86efac" fill-opacity="0.2" stroke="#86efac" stroke-width="0.5"/>
  <circle cx="110" cy="235" r="10" fill="#86efac" fill-opacity="0.2" stroke="#86efac" stroke-width="0.5"/>
  <circle cx="200" cy="250" r="15" fill="#86efac" fill-opacity="0.2" stroke="#86efac" stroke-width="0.5"/>
  <circle cx="240" cy="230" r="11" fill="#86efac" fill-opacity="0.2" stroke="#86efac" stroke-width="0.5"/>
  <circle cx="270" cy="245" r="13" fill="#86efac" fill-opacity="0.2" stroke="#86efac" stroke-width="0.5"/>

  <rect x="0" y="280" width="300" height="40" fill="url(#smas)"/>
  <text x="150" y="305" fill="#a5b4fc" fill-opacity="0.8" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="600">SMAS (근막) 4.5mm</text>
  <path d="M0 290 Q50 285 100 295 T200 290 T300 295" fill="none" stroke="#a5b4fc" stroke-opacity="0.4" stroke-width="1.5"/>
  <path d="M0 300 Q50 305 100 295 T200 305 T300 295" fill="none" stroke="#a5b4fc" stroke-opacity="0.4" stroke-width="1.5"/>
  <path d="M0 310 Q50 305 100 315 T200 310 T300 315" fill="none" stroke="#a5b4fc" stroke-opacity="0.4" stroke-width="1.5"/>
  
  <rect x="0" y="320" width="300" height="80" fill="url(#musc)"/>
  <text x="150" y="365" fill="#c4b5fd" fill-opacity="0.8" font-size="14" font-family="sans-serif" text-anchor="middle" font-weight="600">Muscle (근육) 5mm+</text>
</svg>