<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-LED" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#060608" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow-LED" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="600" height="260" rx="16" fill="url(#bg-LED)" stroke="#4ade80" stroke-opacity="0.2" stroke-width="2"/>
  <text x="30" y="50" fill="#4ade80" font-family="sans-serif" font-weight="800" font-size="28" letter-spacing="1">LED MOA</text>
  <text x="30" y="85" fill="#e4e4e7" font-family="sans-serif" font-weight="600" font-size="16">Light Emitting Diode / LLLT</text>
  <rect x="30" y="110" width="540" height="1" fill="#4ade80" fill-opacity="0.3"/>
  <text x="30" y="145" fill="#a1a1aa" font-family="sans-serif" font-size="15" font-weight="400">저출력 광생체자극(PBM) → 진정, 재생 및 세포 활성화</text>
  <circle cx="270" cy="190" r="6" fill="#4ade80"/><circle cx="300" cy="190" r="6" fill="#4ade80"/><circle cx="330" cy="190" r="6" fill="#4ade80"/><path d="M270 210 Q300 230 330 210" fill="none" stroke="#4ade80" stroke-width="2"/>
