<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-IPL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#060608" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow-IPL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="600" height="260" rx="16" fill="url(#bg-IPL)" stroke="#eab308" stroke-opacity="0.2" stroke-width="2"/>
  <text x="30" y="50" fill="#eab308" font-family="sans-serif" font-weight="800" font-size="28" letter-spacing="1">IPL MOA</text>
  <text x="30" y="85" fill="#e4e4e7" font-family="sans-serif" font-weight="600" font-size="16">Intense Pulsed Light</text>
  <rect x="30" y="110" width="540" height="1" fill="#eab308" fill-opacity="0.3"/>
  <text x="30" y="145" fill="#a1a1aa" font-family="sans-serif" font-size="15" font-weight="400">광대역 스펙트럼(500~1200nm) → 복합 타겟 치료</text>
  <path d="M250 200 Q300 140 350 200" fill="none" stroke="#eab308" stroke-width="4"/><path d="M260 210 Q300 160 340 210" fill="none" stroke="#eab308" stroke-width="2"/>
</svg>