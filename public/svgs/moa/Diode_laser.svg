<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-Diode_laser" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#060608" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow-Diode_laser" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="600" height="260" rx="16" fill="url(#bg-Diode_laser)" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="2"/>
  <text x="30" y="50" fill="#22d3ee" font-family="sans-serif" font-weight="800" font-size="28" letter-spacing="1">Diode laser MOA</text>
  <text x="30" y="85" fill="#e4e4e7" font-family="sans-serif" font-weight="600" font-size="16">Diode Laser</text>
  <rect x="30" y="110" width="540" height="1" fill="#22d3ee" fill-opacity="0.3"/>
  <text x="30" y="145" fill="#a1a1aa" font-family="sans-serif" font-size="15" font-weight="400">808/940nm 대역 모낭 타겟 및 진피 열 전달</text>
  <rect x="280" y="160" width="40" height="60" rx="4" fill="none" stroke="#22d3ee" stroke-width="3"/><line x1="280" y1="190" x2="320" y2="190" stroke="#22d3ee" stroke-width="2"/>
</svg>