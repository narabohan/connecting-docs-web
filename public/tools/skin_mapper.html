<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting Docs | Skin Layer Mapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap');

        body {
            background-color: #03060A;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .mono {
            font-family: 'JetBrains+Mono', monospace;
        }

        .neon-border {
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
        }

        .neon-text {
            color: #00F0FF;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .neon-bg {
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0, 240, 255, 0.4);
        }

        #canvas-container {
            position: relative;
            cursor: crosshair;
            user-select: none;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .point {
            fill: #00F0FF;
            stroke: white;
            stroke-width: 1px;
        }

        .line {
            stroke: #00F0FF;
            stroke-width: 2px;
            stroke-dasharray: 4;
        }

        .polygon {
            fill: rgba(0, 240, 255, 0.15);
            stroke: #00F0FF;
            stroke-width: 2px;
        }

        .active-poly {
            fill: rgba(0, 240, 255, 0.4);
            stroke: white;
        }
    </style>
</head>

<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8 border-b border-white/5 pb-6">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter italic uppercase text-white">Skin Layer <span
                        class="neon-text">Precision Mapper</span></h1>
                <p class="text-xs text-white/40 mono mt-1">CALIBRATION TOOL FOR DEPTH PENETRATION V1.0</p>
            </div>
            <div class="flex gap-4">
                <input type="text" id="imgUrl" placeholder="Image URL (Default: skin_layer_blueprint.png)"
                    class="bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm w-80 focus:neon-border outline-none transition-all">
                <button onclick="updateImage()"
                    class="neon-bg px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-[#00F0FF]/20 transition-all">Reload</button>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <!-- Main Canvas -->
            <div class="col-span-8 flex flex-col items-center">
                <div id="canvas-container" class="neon-border rounded-2xl overflow-hidden bg-black/40">
                    <img id="skinImg" src="../images/concepts/skin_layer_blueprint.png"
                        class="max-w-full h-auto block opacity-80" onload="initCanvas()">
                    <svg id="mappingSvg"></svg>
                </div>
                <div class="mt-8 flex flex-wrap justify-center gap-3">
                    <button onclick="undoPoint()"
                        class="px-5 py-2.5 bg-white/5 border border-white/10 rounded-xl text-xs hover:bg-white/10 transition-all font-bold">UNDO
                        POINT</button>
                    <button onclick="clearCurrent()"
                        class="px-5 py-2.5 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl text-xs hover:bg-red-500/20 transition-all font-bold">CLEAR
                        ZONE</button>
                    <button onclick="saveZone()"
                        class="px-8 py-2.5 bg-green-500/20 border border-green-500/50 text-green-400 rounded-xl text-xs hover:bg-green-500/30 transition-all font-bold uppercase tracking-widest">Save
                        Current Zone</button>
                    <button onclick="copyToClipboard()"
                        class="neon-bg px-8 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest shadow-lg shadow-cyan-500/10 hover:shadow-cyan-500/20">EXPORT
                        ALL DATA</button>
                </div>
                <p class="mt-4 text-[11px] text-white/30 mono uppercase tracking-widest">CLICK: ADD PT | DBL CLICK:
                    CLOSE | MUST SAVE EACH ZONE</p>
            </div>

            <!-- Controls & Data -->
            <div class="col-span-4 space-y-6">
                <!-- Zone Selection -->
                <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
                    <h3 class="text-xs font-bold text-white/60 mb-4 uppercase tracking-widest mono">1. Targeting Layer
                    </h3>
                    <select id="zoneSelect" onchange="switchZone()"
                        class="w-full bg-[#03060A] border border-white/10 rounded-xl px-4 py-4 text-sm focus:neon-border outline-none font-bold">
                        <option value="Stratum_Corneum">Stratum Corneum</option>
                        <option value="Epidermis">Epidermis</option>
                        <option value="DE_Junction">DE Junction</option>
                        <option value="Papillary_Dermis">Papillary Dermis</option>
                        <option value="Reticular_Dermis">Reticular Dermis</option>
                        <option value="SubQ_Fat">SubQ Fat</option>
                        <option value="SMAS">SMAS</option>
                        <option value="Muscle">Muscle</option>
                    </select>
                </div>

                <!-- Export Data -->
                <div class="bg-white/5 border border-white/10 rounded-2xl p-6 h-[400px] flex flex-col">
                    <h3 class="text-xs font-bold text-white/60 mb-4 uppercase tracking-widest mono">2. JSON Calibration
                        Data</h3>
                    <textarea id="dataOutput" readonly
                        class="flex-1 w-full bg-[#03060A] border border-white/10 rounded-xl p-4 text-[10px] mono text-[#00F0FF]/80 resize-none outline-none leading-relaxed"></textarea>
                </div>

                <!-- SVG Markup -->
                <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
                    <h3 class="text-xs font-bold text-white/60 mb-4 uppercase tracking-widest mono">3. SVG Element
                        Snippets</h3>
                    <div id="svgOutput"
                        class="text-[10px] mono text-white/40 break-all bg-black/40 p-4 rounded-xl border border-white/5 h-32 overflow-y-auto">
                        Awaiting data...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPoints = [];
        let allZones = {};
        let activeZone = 'Stratum_Corneum';
        const container = document.getElementById('canvas-container');
        const svg = document.getElementById('mappingSvg');
        const img = document.getElementById('skinImg');

        function initCanvas() {
            svg.setAttribute('viewBox', `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
            updateOutput();
        }

        container.addEventListener('mousedown', (e) => {
            const rect = img.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) * (img.naturalWidth / rect.width));
            const y = Math.round((e.clientY - rect.top) * (img.naturalHeight / rect.height));
            currentPoints.push({ x, y });
            draw();
        });

        container.addEventListener('dblclick', () => {
            if (currentPoints.length > 2) {
                draw(); // Final draw for closing visual
            }
        });

        function saveZone() {
            if (currentPoints.length > 2) {
                allZones[activeZone] = [...currentPoints];
                currentPoints = [];
                draw();
                updateOutput();
                alert(`${activeZone} Saved!`);
            } else {
                alert("Please click at least 3 points before saving.");
            }
        }

        function draw() {
            svg.innerHTML = '';

            // Draw all saved zones
            Object.entries(allZones).forEach(([name, pts]) => {
                const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                poly.setAttribute('points', pts.map(p => `${p.x},${p.y}`).join(' '));
                poly.setAttribute('class', name === activeZone ? 'polygon active-poly' : 'polygon');
                svg.appendChild(poly);
            });

            // Draw active zone creation
            if (currentPoints.length > 0) {
                currentPoints.forEach(p => {
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', p.x); circle.setAttribute('cy', p.y);
                    circle.setAttribute('r', (img.naturalWidth / 200));
                    circle.setAttribute('class', 'point');
                    svg.appendChild(circle);
                });

                if (currentPoints.length > 1) {
                    const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                    polyline.setAttribute('points', currentPoints.map(p => `${p.x},${p.y}`).join(' '));
                    polyline.setAttribute('class', 'line');
                    polyline.setAttribute('fill', 'none');
                    svg.appendChild(polyline);
                }
            }
        }

        function switchZone() {
            activeZone = document.getElementById('zoneSelect').value;
            currentPoints = [];
            draw();
        }

        function undoPoint() { currentPoints.pop(); draw(); }
        function clearCurrent() { allZones[activeZone] = undefined; currentPoints = []; draw(); updateOutput(); }

        function updateOutput() {
            const cleanData = {};
            let svgMarkup = '';
            Object.entries(allZones).forEach(([name, pts]) => {
                if (pts) {
                    const pointsStr = pts.map(p => `${p.x},${p.y}`).join(' ');
                    cleanData[name] = pointsStr;
                    svgMarkup += `&lt;polygon id="poly_${name}" points="${pointsStr}" /&gt;\n`;
                }
            });
            document.getElementById('dataOutput').value = JSON.stringify(cleanData, null, 2);
            document.getElementById('svgOutput').innerHTML = svgMarkup.replace(/\n/g, '<br>') || 'Awaiting data...';
        }

        function updateImage() {
            const url = document.getElementById('imgUrl').value;
            if (url) img.src = url;
        }

        function copyToClipboard() {
            const text = document.getElementById('dataOutput').value;
            navigator.clipboard.writeText(text).then(() => alert('Export Successful: JSON copied to clipboard!'));
        }
    </script>
</body>

</html>
